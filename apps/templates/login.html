{% extends 'eyeconic_base.html' %}
{% block title %}Login – ChasmaGallery{% endblock %}
{% block content %}
<div style="min-height:70vh; display:flex; align-items:center; justify-content:center; padding:3rem 5vw;">
  <div style="background:#fff; border:1px solid var(--light-gray); width:100%; max-width:440px; padding:3rem 2.5rem; text-align:center;">
    <h2 style="font-family:var(--font-display); font-size:2rem; font-weight:600; color:var(--charcoal); margin-bottom:0.5rem;">Welcome Back</h2>
    <p style="color:var(--mid-gray); font-size:0.9rem; margin-bottom:2.5rem;">Please enter your details to sign in.</p>
    <form method="post" action="{{ url_for('auth.login', next=request.args.get('next', '')) }}" style="text-align:left;">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <div style="margin-bottom:1.5rem;">
        <label style="display:block; font-size:0.7rem; letter-spacing:0.15em; text-transform:uppercase; font-weight:700; color:var(--charcoal); margin-bottom:0.5rem;">Email Address</label>
        <input type="email" name="email" required placeholder="name@example.com" />
      </div>
      <div style="margin-bottom:2rem;">
        <label style="display:block; font-size:0.7rem; letter-spacing:0.15em; text-transform:uppercase; font-weight:700; color:var(--charcoal); margin-bottom:0.5rem;">Password</label>
        <input type="password" name="password" required placeholder="••••••••" />
      </div>
      <button type="submit" class="btn-atc" style="width:100%;">Sign In</button>
    </form>
    <p style="margin-top:2rem; font-size:0.85rem; color:var(--mid-gray);">
      Don't have an account? <a href="{{ url_for('auth.register') }}" style="color:var(--gold); font-weight:700; text-decoration:none;">Create one</a>
    </p>
  </div>
</div>
{% endblock %}
