{% extends 'eyeconic_base.html' %}
{% block title %}Register – ChasmaGallery{% endblock %}
{% block content %}
<div style="min-height:70vh; display:flex; align-items:center; justify-content:center; padding:3rem 5vw;">
  <div style="background:#fff; border:1px solid var(--light-gray); width:100%; max-width:500px; padding:3rem 2.5rem; text-align:center;">
    <h2 style="font-family:var(--font-display); font-size:2rem; font-weight:600; color:var(--charcoal); margin-bottom:0.5rem;">Create Account</h2>
    <p style="color:var(--mid-gray); font-size:0.9rem; margin-bottom:2.5rem;">Join the ChasmaGallery family today.</p>
    <form method="post" action="{{ url_for('auth.register') }}" style="text-align:left;">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:1.25rem; margin-bottom:1.5rem;">
        <div>
          <label style="display:block; font-size:0.7rem; letter-spacing:0.15em; text-transform:uppercase; font-weight:700; color:var(--charcoal); margin-bottom:0.5rem;">First Name</label>
          <input type="text" name="first_name" required />
        </div>
        <div>
          <label style="display:block; font-size:0.7rem; letter-spacing:0.15em; text-transform:uppercase; font-weight:700; color:var(--charcoal); margin-bottom:0.5rem;">Last Name</label>
          <input type="text" name="last_name" required />
        </div>
      </div>
      <div style="margin-bottom:1.5rem;">
        <label style="display:block; font-size:0.7rem; letter-spacing:0.15em; text-transform:uppercase; font-weight:700; color:var(--charcoal); margin-bottom:0.5rem;">Email Address</label>
        <input type="email" name="email" required />
      </div>
      <div style="margin-bottom:1.5rem;">
        <label style="display:block; font-size:0.7rem; letter-spacing:0.15em; text-transform:uppercase; font-weight:700; color:var(--charcoal); margin-bottom:0.5rem;">Password</label>
        <input type="password" name="password" required placeholder="At least 6 characters" />
      </div>
      <div style="margin-bottom:2rem;">
        <label style="display:block; font-size:0.7rem; letter-spacing:0.15em; text-transform:uppercase; font-weight:700; color:var(--charcoal); margin-bottom:0.5rem;">Confirm Password</label>
        <input type="password" name="confirm_password" required />
      </div>
      <button type="submit" class="btn-atc" style="width:100%;">Create Account</button>
    </form>
    <p style="margin-top:2rem; font-size:0.85rem; color:var(--mid-gray);">
      Already have an account? <a href="{{ url_for('auth.login') }}" style="color:var(--gold); font-weight:700; text-decoration:none;">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
